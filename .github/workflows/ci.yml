name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: nix (x86_64-linux)
    runs-on: ubuntu-latest
    timeout-minutes: 24
    env:
      CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Select Cachix mode
        id: cachix-mode
        if: ${{ env.CACHIX_CACHE != '' && github.event_name != 'pull_request' }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [[ -n "$CACHIX_AUTH_TOKEN" ]]; then
            printf '%s\n' 'push-enabled=true' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' 'push-enabled=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Cachix (pull-only)
        if: ${{ env.CACHIX_CACHE != '' && (github.event_name == 'pull_request' || steps.cachix-mode.outputs.push-enabled != 'true') }}
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          extraPullNames: nix-community
          skipPush: true

      - name: Configure Cachix (push-enabled)
        if: ${{ env.CACHIX_CACHE != '' && github.event_name != 'pull_request' && steps.cachix-mode.outputs.push-enabled == 'true' }}
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Run flake checks
        timeout-minutes: 10
        run: timeout 600s nix flake check --print-build-logs --max-jobs 1

      - name: Materialize check artifacts
        timeout-minutes: 2
        run: |
          set -euo pipefail
          outputs="$(timeout 120s nix build --no-link --print-out-paths \
            ".#checks.x86_64-linux.json-results-artifact" \
            ".#checks.x86_64-linux.jsonl-events-artifact" \
            ".#checks.x86_64-linux.cli-json-results" \
            ".#checks.x86_64-linux.ai-metadata-artifact" \
            ".#checks.x86_64-linux.plan-artifact" \
            ".#checks.x86_64-linux.watch-once-artifact" \
            ".#checks.x86_64-linux.tap-artifact" \
            ".#checks.x86_64-linux.junit-artifact" \
            ".#checks.x86_64-linux.coverage-artifact")"
          while IFS= read -r output; do
            test -d "$output"
            cp -R "$output"/. .
          done <<< "$outputs"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cl-weave-test-reports-x86_64-linux
          path: |
            cl-weave-results.json
            cl-weave-events.jsonl
            cl-weave-cli-results.json
            cl-weave-metadata.json
            cl-weave-plan.json
            cl-weave-watch-once.json
            cl-weave-tap.txt
            cl-weave-junit.xml
            cl-weave.coverage
            cl-weave-coverage-report/
          if-no-files-found: error
