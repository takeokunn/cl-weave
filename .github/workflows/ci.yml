name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run flake checks
        timeout-minutes: 10
        run: timeout 600s nix flake check --print-build-logs

      - name: Run JSON reporter
        timeout-minutes: 2
        run: |
          nix develop --command timeout 60s env CL_WEAVE_REPORTER=json sbcl --noinform --non-interactive --load scripts/run-tests.lisp > cl-weave-results.json

      - name: Run filtered smoke test
        timeout-minutes: 2
        run: |
          nix develop --command timeout 60s env CL_WEAVE_TEST_FILTER='filtering > runs only tests matching a path substring' sbcl --noinform --non-interactive --load scripts/run-tests.lisp

      - name: Run JUnit reporter
        timeout-minutes: 2
        run: |
          nix develop --command timeout 60s env CL_WEAVE_REPORTER=junit sbcl --noinform --non-interactive --load scripts/run-tests.lisp > cl-weave-junit.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cl-weave-test-reports
          path: |
            cl-weave-results.json
            cl-weave-junit.xml
          if-no-files-found: error
