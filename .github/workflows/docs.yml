name: Publish documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Select Cachix mode
        id: cachix-mode
        if: ${{ env.CACHIX_CACHE != '' && github.event_name != 'pull_request' }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          if [[ -n "$CACHIX_AUTH_TOKEN" ]]; then
            printf '%s\n' 'push-enabled=true' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' 'push-enabled=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Cachix (pull-only)
        if: ${{ env.CACHIX_CACHE != '' && (github.event_name == 'pull_request' || steps.cachix-mode.outputs.push-enabled != 'true') }}
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          extraPullNames: nix-community
          skipPush: true

      - name: Configure Cachix (push-enabled)
        if: ${{ env.CACHIX_CACHE != '' && github.event_name != 'pull_request' && steps.cachix-mode.outputs.push-enabled == 'true' }}
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build documentation
        run: |
          nix build .#docs
          cp -rL result public
          chmod -R u+w public

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: public

  deploy:
    name: Deploy documentation
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # Publish the uploaded artifact to GitHub Pages.
      id-token: write # Authenticate the deployment with GitHub OIDC.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
